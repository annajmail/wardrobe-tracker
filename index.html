};

const DEFAULT_STATE = {items:REAL_ITEMS,outfits:PRELOADED_OUTFITS,donatedCount:25,version:2};

function reducer(state,action) {
  switch(action.type) {
    case "ADD_ITEM": return {...state,items:[...state.items,{...action.payload,id:`item-${Date.now()}-${Math.random().toString(36).slice(2,6)}`}]};
    case "UPDATE_ITEM": return {...state,items:state.items.map(i=>i.id===action.id?{...i,...action.payload}:i)};
    case "DELETE_ITEM": return {...state,items:state.items.filter(i=>i.id!==action.id)};
    case "DONATE_ITEM": return {...state,items:state.items.filter(i=>i.id!==action.id),donatedCount:state.donatedCount+1};
    case "LOG_OUTFIT": return {...state,outfits:[...state.outfits,{...action.payload,id:`outfit-${Date.now()}`,date:new Date().toISOString().slice(0,10)}]};
    case "DELETE_OUTFIT": return {...state,outfits:state.outfits.filter(o=>o.id!==action.id)};
    case "WEAR_ITEM": return {...state,items:state.items.map(i=>i.id===action.id?{...i,wornCount:(i.wornCount||0)+1,lastWorn:new Date().toISOString().slice(0,10)}:i)};
    case "LOAD_STATE": return action.payload;
    case "RESET": return DEFAULT_STATE;
    default: return state;
  }
}

function usePersistedState() {
  const [state,dispatch] = useReducer(reducer,DEFAULT_STATE);
  const [loaded,setLoaded] = useState(false);
  const [saveStatus,setSaveStatus] = useState("");
  useEffect(()=>{
    const saved = storage.get("wardrobe-state-v2");
    if(saved) dispatch({type:"LOAD_STATE",payload:saved});
    setLoaded(true);
  },[]);
  useEffect(()=>{
    if(!loaded) return;
    const ok = storage.set("wardrobe-state-v2",state);
    setSaveStatus(ok?"saved":"error");
    const t = setTimeout(()=>setSaveStatus(""),1500);
    return ()=>clearTimeout(t);
  },[state,loaded]);
  return {state,dispatch,loaded,saveStatus};
}

function StatCard({icon,label,value,sub,color=C.accent}) {

function Badge({status}) {
  const cm={keeping:C.keep,donating:C.donate,maybe:C.maybe};
  const lm={keeping:"✅ Keep",donating:"📦 Donate",maybe:"🤔 Maybe"};
  return <span style={{display:"inline-block",padding:"2px 9px",borderRadius:"12px",fontSize:"11px",fontWeight:600,background:`${cm[status]}18`,color:cm[status],border:`1px solid ${cm[status]}40`}}>{lm[status]}</span>;
}

function ProgressRing({current,target,label,icon}) {
  const pct=Math.min(Math.round((current/target)*100),100);
  const over=current>target;const color=over?C.danger:C.keep;
  return <div style={{textAlign:"center",minWidth:"80px"}}>
    <div style={{position:"relative",width:"60px",height:"60px",margin:"0 auto"}}>
      <svg width="60" height="60" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="24" fill="none" stroke={C.border} strokeWidth="5"/>
        <circle cx="30" cy="30" r="24" fill="none" stroke={color} strokeWidth="5" strokeDasharray={`${(pct/100)*150.8} 150.8`} strokeLinecap="round" transform="rotate(-90 30 30)" style={{transition:"stroke-dasharray 0.5s ease"}}/>
      </svg>
      <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",fontSize:"12px",fontWeight:700,color:over?C.danger:C.text}}>{current}/{target}</div>
    </div>
    <div style={{fontSize:"10px",color:C.textMuted,marginTop:"4px"}}>{icon} {label}</div>
  </div>;
}

  const pieData=[{name:"Keeping",value:keeping.length},{name:"Donated",value:state.donatedCount},{name:"Maybe",value:maybes.length}].filter(d=>d.value>0);
  const subGroups={};
  keeping.forEach(i=>{const key=i.subcategory||i.category;subGroups[key]=(subGroups[key]||0)+1;});
  const subData=Object.entries(subGroups).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count);
  const wornItems=keeping.filter(i=>i.wornCount>0).length;
  const unwornItems=keeping.filter(i=>!i.wornCount).length;
  return <div>
    <div style={{display:"flex",gap:"10px",flexWrap:"wrap",marginBottom:"20px"}}>
      <StatCard icon="👗" label="Current Wardrobe" value={keeping.length} color={C.keep}/>
      <StatCard icon="📦" label="Total Donated" value={state.donatedCount} color={C.donate} sub="Since Mar 17"/>
      <StatCard icon="👔" label="Outfits Logged" value={state.outfits.length} color={C.accent}/>
      <StatCard icon="👕" label="Items Worn" value={wornItems} color={C.warm} sub={`${unwornItems} unworn`}/>
    </div>
    <div style={{display:"flex",gap:"16px",flexWrap:"wrap",marginBottom:"20px"}}>
      <div style={{background:C.card,borderRadius:"14px",padding:"18px",border:`1px solid ${C.border}`,flex:"1",minWidth:"240px"}}>
        <h3 style={{margin:"0 0 12px",fontSize:"14px",color:C.text,fontFamily:"'DM Sans',sans-serif"}}>📊 Overview</h3>
        <ResponsiveContainer width="100%" height={170}>
          <PieChart><Pie data={pieData} cx="50%" cy="50%" innerRadius={40} outerRadius={65} dataKey="value" paddingAngle={3} strokeWidth={0}>
            {pieData.map((_,i)=><Cell key={i} fill={[C.keep,C.donate,C.maybe][i]}/>)}
          </Pie><Tooltip formatter={(v,n)=>[`${v} items`,n]}/><Legend wrapperStyle={{fontSize:"11px"}}/></PieChart>
        </ResponsiveContainer>

      <div style={{background:C.card,borderRadius:"14px",padding:"18px",border:`1px solid ${C.border}`,flex:"1.4",minWidth:"280px"}}>
        <h3 style={{margin:"0 0 12px",fontSize:"14px",color:C.text,fontFamily:"'DM Sans',sans-serif"}}>👚 By Subcategory</h3>
        <ResponsiveContainer width="100%" height={170}>
          <BarChart data={subData} layout="vertical" margin={{left:80}}>
            <XAxis type="number" tick={{fontSize:11}}/><YAxis type="category" dataKey="name" tick={{fontSize:11}} width={75}/>
            <Tooltip/><Bar dataKey="count" name="Items" fill={C.sage} radius={[0,4,4,0]}/>

      </div>
    </div>

      <h3 style={{margin:"0 0 14px",fontSize:"14px",color:C.text,fontFamily:"'DM Sans',sans-serif"}}>🎯 Capsule-Lite Targets</h3>
      <div style={{display:"flex",gap:"12px",flexWrap:"wrap",justifyContent:"center"}}>

function Inventory({state,dispatch}) {
  const [showAdd,setShowAdd]=useState(false);
  const [filter,setFilter]=useState("all");
  const [catFilter,setCatFilter]=useState("all");
  const [subFilter,setSubFilter]=useState("all");
  const [search,setSearch]=useState("");
  const [form,setForm]=useState({name:"",category:"Tops",subcategory:"",status:"keeping",notes:""});
  const [editId,setEditId]=useState(null);
  const filtered=state.items.filter(i=>{
    if(filter!=="all"&&i.status!==filter) return false;
    if(catFilter!=="all"&&i.category!==catFilter) return false;
    if(subFilter!=="all"&&i.subcategory!==subFilter) return false;
    if(search&&!i.name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });
  const availableSubs=catFilter!=="all"?(SUBCATEGORIES[catFilter]||[]):[];
  const handleSubmit=()=>{
    if(!form.name.trim()) return;
    if(editId){dispatch({type:"UPDATE_ITEM",id:editId,payload:form});setEditId(null);}
    else{dispatch({type:"ADD_ITEM",payload:{...form,dateAdded:new Date().toISOString().slice(0,10),wornCount:0,lastWorn:null}});}
    setForm({name:"",category:"Tops",subcategory:"",status:"keeping",notes:""});setShowAdd(false);
  };
  const startEdit=(item)=>{setForm({name:item.name,category:item.category,subcategory:item.subcategory||"",status:item.status,notes:item.notes||""});setEditId(item.id);setShowAdd(true);};
  const inp={padding:"9px 12px",border:`1px solid ${C.border}`,borderRadius:"10px",fontSize:"13px",fontFamily:"'DM Sans',sans-serif",color:C.text,background:C.bg,outline:"none",width:"100%",boxSizing:"border-box"};
  const btnSm=(extra={})=>({width:"30px",height:"30px",border:`1px solid ${C.border}`,borderRadius:"8px",background:C.bg,cursor:"pointer",fontSize:"13px",display:"flex",alignItems:"center",justifyContent:"center",...extra});

  return <div>
    <div style={{display:"flex",gap:"8px",marginBottom:"14px",flexWrap:"wrap",alignItems:"center"}}>
      <input placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,width:"140px",flex:"1"}}/>
      <select value={filter} onChange={e=>setFilter(e.target.value)} style={{...inp,width:"auto",cursor:"pointer"}}>
        <option value="all">All Status</option><option value="keeping">✅ Keep</option><option value="donating">📦 Donate</option><option value="maybe">🤔 Maybe</option>
      </select>
      <select value={catFilter} onChange={e=>{setCatFilter(e.target.value);setSubFilter("all");}} style={{...inp,width:"auto",cursor:"pointer"}}>
        <option value="all">All Categories</option>
        {CATEGORIES.map(c=><option key={c} value={c}>{CAPSULE_LIMITS[c].icon} {c}</option>)}
      </select>
      {availableSubs.length>0&&<select value={subFilter} onChange={e=>setSubFilter(e.target.value)} style={{...inp,width:"auto",cursor:"pointer"}}>
        <option value="all">All Subtypes</option>{availableSubs.map(s=><option key={s} value={s}>{s}</option>)}
      </select>}
      <button onClick={()=>{setShowAdd(!showAdd);setEditId(null);setForm({name:"",category:"Tops",subcategory:"",status:"keeping",notes:""});}}
        style={{padding:"9px 18px",background:C.accent,color:"#fff",border:"none",borderRadius:"10px",fontSize:"13px",fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap"}}>
        {showAdd?"✕ Cancel":"＋ Add Item"}
      </button>
    </div>
    {showAdd&&<div style={{background:C.card,borderRadius:"14px",padding:"18px",border:`1px solid ${C.border}`,marginBottom:"14px"}}>
      <h4 style={{margin:"0 0 12px",color:C.text,fontFamily:"'DM Sans',sans-serif",fontSize:"14px"}}>{editId?"✏️ Edit Item":"➕ New Item"}</h4>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
        <input placeholder="Item name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} style={{...inp,gridColumn:"1 / -1"}}/>
        <select value={form.category} onChange={e=>setForm({...form,category:e.target.value,subcategory:""})} style={inp}>
          {CATEGORIES.map(c=><option key={c} value={c}>{CAPSULE_LIMITS[c].icon} {c}</option>)}
        </select>
        <select value={form.subcategory} onChange={e=>setForm({...form,subcategory:e.target.value})} style={inp}>
          <option value="">Subcategory...</option>{(SUBCATEGORIES[form.category]||[]).map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <select value={form.status} onChange={e=>setForm({...form,status:e.target.value})} style={inp}>
          {STATUS_OPTIONS.map(s=><option key={s} value={s}>{s==="keeping"?"✅ Keeping":s==="donating"?"📦 Donating":"🤔 Maybe"}</option>)}
        </select>
        <input placeholder="Notes (optional)" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} style={inp}/>
      </div>
      <button onClick={handleSubmit} style={{marginTop:"12px",padding:"9px 24px",background:C.sage,color:"#fff",border:"none",borderRadius:"10px",fontSize:"13px",fontWeight:600,cursor:"pointer"}}>
        {editId?"💾 Save":"✅ Add"}
      </button>
    </div>}
    <div style={{fontSize:"12px",color:C.textMuted,marginBottom:"10px"}}>{filtered.length} item{filtered.length!==1?"s":""}</div>
    <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
      {filtered.map(item=><div key={item.id} style={{background:C.card,borderRadius:"12px",padding:"12px 16px",border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:"10px"}}>
        <span style={{fontSize:"18px"}}>{CAPSULE_LIMITS[item.category]?.icon||"👚"}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:"13px",color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.name}</div>
          <div style={{fontSize:"11px",color:C.textMuted}}>{item.subcategory||item.category}{item.wornCount>0?` • Worn ${item.wornCount}×`:""}{item.lastWorn?` • Last: ${item.lastWorn}`:""}</div>
        </div>
        <Badge status={item.status}/>
        <div style={{display:"flex",gap:"3px"}}>
          {item.status==="keeping"&&<button onClick={()=>dispatch({type:"WEAR_ITEM",id:item.id})} title="Log wear" style={btnSm()}>👕</button>}
          <button onClick={()=>startEdit(item)} title="Edit" style={btnSm()}>✏️</button>
          {item.status==="keeping"&&<button onClick={()=>{if(confirm("Donate this item?"))dispatch({type:"DONATE_ITEM",id:item.id});}} title="Donate" style={btnSm({border:`1px solid ${C.donate}40`,background:`${C.donate}08`})}>📦</button>}
          <button onClick={()=>{if(confirm("Delete?"))dispatch({type:"DELETE_ITEM",id:item.id});}} title="Delete" style={btnSm({border:`1px solid ${C.danger}30`,background:`${C.danger}08`})}>🗑️</button>
        </div>
      </div>)}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"36px",color:C.textMuted}}><div style={{fontSize:"28px",marginBottom:"8px"}}>👗</div><div>No items found</div></div>}
    </div>
  </div>;
}

// ─── Outfits ───
function Outfits({state,dispatch}) {
  const [selectedItems,setSelectedItems]=useState([]);
  const [outfitName,setOutfitName]=useState("");
  const [outfitType,setOutfitType]=useState("casual");
  const [outfitNotes,setOutfitNotes]=useState("");
  const [filterCat,setFilterCat]=useState("all");
  const [viewMode,setViewMode]=useState("log");
  const keepingItems=state.items.filter(i=>i.status==="keeping");
  const displayItems=filterCat==="all"?keepingItems:keepingItems.filter(i=>i.category===filterCat);
  const toggleItem=(id)=>setSelectedItems(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  const logOutfit=()=>{
    if(selectedItems.length===0) return;
    dispatch({type:"LOG_OUTFIT",payload:{name:outfitName||`Outfit #${state.outfits.length+1}`,type:outfitType,itemIds:selectedItems,notes:outfitNotes}});
    selectedItems.forEach(id=>dispatch({type:"WEAR_ITEM",id}));
    setSelectedItems([]);setOutfitName("");setOutfitNotes("");
  };
  const wearData=keepingItems.filter(i=>i.wornCount>0).sort((a,b)=>b.wornCount-a.wornCount).slice(0,10);
  const neverWorn=keepingItems.filter(i=>!i.wornCount||i.wornCount===0);
  const inp={padding:"9px 12px",border:`1px solid ${C.border}`,borderRadius:"10px",fontSize:"13px",fontFamily:"'DM Sans',sans-serif",color:C.text,background:C.bg,outline:"none",width:"100%",boxSizing:"border-box"};

  return <div>
    <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
      {[["log","➕ Log Outfit"],["history","📅 History"],["stats","📊 Stats"]].map(([key,label])=>
        <button key={key} onClick={()=>setViewMode(key)} style={{
          padding:"8px 16px",border:`1px solid ${viewMode===key?C.accent:C.border}`,borderRadius:"20px",
          background:viewMode===key?`${C.accent}15`:"transparent",color:viewMode===key?C.accent:C.textMuted,
          fontSize:"12px",fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
        }}>{label}</button>
      )}
    </div>

    {viewMode==="log"&&<div style={{background:C.card,borderRadius:"14px",padding:"18px",border:`1px solid ${C.border}`}}>
      <h3 style={{margin:"0 0 12px",fontSize:"14px",color:C.text,fontFamily:"'DM Sans',sans-serif"}}>👗 Log Today's Outfit</h3>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"10px"}}>
        <input placeholder="Outfit name (optional)" value={outfitName} onChange={e=>setOutfitName(e.target.value)} style={inp}/>
        <select value={outfitType} onChange={e=>setOutfitType(e.target.value)} style={inp}>
          {OUTFIT_TYPES.map(t=><option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}
        </select>
      </div>
      <input placeholder="Notes (optional)" value={outfitNotes} onChange={e=>setOutfitNotes(e.target.value)} style={{...inp,marginBottom:"10px"}}/>
      <div style={{display:"flex",gap:"6px",marginBottom:"10px",flexWrap:"wrap"}}>
        {["all",...CATEGORIES.filter(c=>keepingItems.some(i=>i.category===c))].map(c=>
          <button key={c} onClick={()=>setFilterCat(c)} style={{
            padding:"4px 12px",border:`1px solid ${filterCat===c?C.accent:C.border}`,borderRadius:"16px",
            background:filterCat===c?`${C.accent}15`:"transparent",color:filterCat===c?C.accent:C.textMuted,
            fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
          }}>{c==="all"?"All":`${CAPSULE_LIMITS[c]?.icon} ${c}`}</button>
        )}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"12px",maxHeight:"200px",overflowY:"auto"}}>
        {displayItems.map(item=>
          <button key={item.id} onClick={()=>toggleItem(item.id)} style={{
            padding:"5px 10px",border:`2px solid ${selectedItems.includes(item.id)?C.accent:C.border}`,
            borderRadius:"18px",background:selectedItems.includes(item.id)?`${C.accent}15`:C.bg,
            fontSize:"11px",fontWeight:selectedItems.includes(item.id)?600:400,
            color:selectedItems.includes(item.id)?C.accent:C.text,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
          }}>{CAPSULE_LIMITS[item.category]?.icon} {item.name}</button>
        )}
      </div>
      <button onClick={logOutfit} disabled={selectedItems.length===0} style={{
        padding:"9px 22px",background:selectedItems.length>0?C.accent:C.border,color:"#fff",
        border:"none",borderRadius:"10px",fontSize:"13px",fontWeight:600,
        cursor:selectedItems.length>0?"pointer":"default",fontFamily:"'DM Sans',sans-serif",
      }}>✨ Log Outfit ({selectedItems.length} items)</button>
    </div>}

    {viewMode==="history"&&<div style={{background:C.card,borderRadius:"14px",padding:"18px",border:`1px solid ${C.border}`}}>
      <h3 style={{margin:"0 0 14px",fontSize:"14px",color:C.text,fontFamily:"'DM Sans',sans-serif"}}>📅 All Outfits ({state.outfits.length})</h3>
      <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
        {[...state.outfits].reverse().map(outfit=>
          <div key={outfit.id} style={{padding:"14px",background:C.bg,borderRadius:"12px",border:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                <span style={{fontWeight:600,fontSize:"14px",color:C.text}}>{outfit.name}</span>
                {outfit.type&&<TypeBadge type={outfit.type}/>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                <span style={{fontSize:"11px",color:C.textMuted}}>{outfit.date}</span>
                <button onClick={()=>{if(confirm("Delete this outfit?"))dispatch({type:"DELETE_OUTFIT",id:outfit.id});}}
                  style={{width:"24px",height:"24px",border:`1px solid ${C.danger}30`,borderRadius:"6px",background:`${C.danger}08`,cursor:"pointer",fontSize:"11px",display:"flex",alignItems:"center",justifyContent:"center"}}>🗑️</button>
              </div>
            </div>
            {outfit.notes&&<div style={{fontSize:"11px",color:C.textMuted,marginBottom:"6px",fontStyle:"italic"}}>{outfit.notes}</div>}
            <div style={{display:"flex",flexWrap:"wrap",gap:"4px"}}>
              {outfit.itemIds.map(id=>{
                const item=state.items.find(i=>i.id===id);
                return item?<span key={id} style={{padding:"3px 8px",background:C.card,borderRadius:"8px",fontSize:"11px",color:C.text,border:`1px solid ${C.border}`,fontWeight:500}}>{CAPSULE_LIMITS[item.category]?.icon} {item.name}</span>:null;
              })}
            </div>
          </div>
        )}
      </div>
    </div>}

    {viewMode==="stats"&&<div style={{display:"flex",gap:"14px",flexWrap:"wrap"}}>
      <div style={{background:C.card,borderRadius:"14px",padding:"18px",border:`1px solid ${C.border}`,flex:"1",minWidth:"240px"}}>
        <h3 style={{margin:"0 0 12px",fontSize:"14px",color:C.text,fontFamily:"'DM Sans',sans-serif"}}>🔥 Most Worn</h3>
        {wearData.length>0?<div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
          {wearData.map((item,idx)=><div key={item.id} style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <span style={{fontSize:"13px",fontWeight:700,color:C.textMuted,width:"18px"}}>#{idx+1}</span>
            <span style={{fontSize:"13px"}}>{CAPSULE_LIMITS[item.category]?.icon}</span>
            <span style={{flex:1,fontSize:"12px",color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.name}</span>
            <span style={{background:`${C.sage}20`,color:C.sage,padding:"2px 7px",borderRadius:"8px",fontSize:"11px",fontWeight:600}}>{item.wornCount}×</span>
          </div>)}
        </div>:<div style={{textAlign:"center",padding:"18px",color:C.textMuted,fontSize:"12px"}}>Log outfits to see stats! 👗</div>}
      </div>
      <div style={{background:C.card,borderRadius:"14px",padding:"18px",border:`1px solid ${C.border}`,flex:"1",minWidth:"240px"}}>
        <h3 style={{margin:"0 0 12px",fontSize:"14px",color:C.text,fontFamily:"'DM Sans',sans-serif"}}>⚠️ Never Worn ({neverWorn.length})</h3>
        <p style={{fontSize:"11px",color:C.textMuted,margin:"0 0 10px"}}>Consider donating items you haven't worn 💛</p>
        <div style={{display:"flex",flexDirection:"column",gap:"5px",maxHeight:"200px",overflowY:"auto"}}>
          {neverWorn.slice(0,20).map(item=><div key={item.id} style={{display:"flex",alignItems:"center",gap:"7px",fontSize:"12px"}}>
            <span>{CAPSULE_LIMITS[item.category]?.icon}</span>
            <span style={{flex:1,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.name}</span>
            <button onClick={()=>dispatch({type:"DONATE_ITEM",id:item.id})}
              style={{padding:"2px 7px",border:`1px solid ${C.donate}40`,borderRadius:"6px",background:`${C.donate}10`,color:C.donate,fontSize:"10px",cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>📦</button>
          </div>)}
        </div>
      </div>
    </div>}
  </div>;
}

// ─── Settings ───
function Settings({dispatch}) {
  const [confirmReset,setConfirmReset]=useState(false);
  return <div style={{background:C.card,borderRadius:"14px",padding:"18px",border:`1px solid ${C.border}`}}>
    <h3 style={{margin:"0 0 14px",fontSize:"14px",color:C.text,fontFamily:"'DM Sans',sans-serif"}}>⚙️ Settings</h3>
    <p style={{fontSize:"12px",color:C.textMuted,marginBottom:"14px"}}>Your data saves automatically to this device using localStorage. ✨</p>
    <p style={{fontSize:"12px",color:C.textMuted,marginBottom:"14px"}}>💡 <strong>Workflow:</strong> Log outfits & manage items here daily. Chat with Claude to sync updates to memory.</p>
    {!confirmReset?
      <button onClick={()=>setConfirmReset(true)} style={{padding:"9px 18px",background:`${C.danger}15`,color:C.danger,border:`1px solid ${C.danger}40`,borderRadius:"10px",fontSize:"13px",fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
        🔄 Reset to Original Data
      </button>
    :<div>
      <p style={{fontSize:"12px",color:C.danger,marginBottom:"10px"}}>⚠️ This will reset everything to the original 53 items and 5 outfits. Are you sure?</p>
      <div style={{display:"flex",gap:"8px"}}>
        <button onClick={()=>{dispatch({type:"RESET"});setConfirmReset(false);}} style={{padding:"9px 18px",background:C.danger,color:"#fff",border:"none",borderRadius:"10px",fontSize:"13px",fontWeight:600,cursor:"pointer"}}>Yes, Reset</button>
        <button onClick={()=>setConfirmReset(false)} style={{padding:"9px 18px",background:C.border,color:C.text,border:"none",borderRadius:"10px",fontSize:"13px",fontWeight:600,cursor:"pointer"}}>Cancel</button>
      </div>
    </div>}
  </div>;
}

// ─── Main ───
function App() {
  const {state,dispatch,loaded,saveStatus}=usePersistedState();
  const [tab,setTab]=useState("dashboard");
  const keepCount=state.items.filter(i=>i.status==="keeping").length;

  if(!loaded) return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"}}>
    <div style={{textAlign:"center"}}><div style={{fontSize:"40px",marginBottom:"12px"}}>👗</div><div style={{color:C.textMuted}}>Loading your wardrobe...</div></div>
  </div>;

  return <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'DM Sans',sans-serif",color:C.text}}>
    <div style={{background:`linear-gradient(135deg,${C.accent},${C.warm})`,padding:"22px 22px 14px",borderRadius:"0 0 22px 22px",position:"relative"}}>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        <span style={{fontSize:"26px"}}>👗</span>
        <div>
          <h1 style={{margin:0,fontSize:"20px",fontWeight:700,color:"#fff",fontFamily:"'Playfair Display',serif"}}>Anna's Wardrobe Tracker</h1>
          <p style={{margin:"2px 0 0",fontSize:"11px",color:"rgba(255,255,255,0.8)"}}>Capsule-Lite Journey • {keepCount} items • {state.donatedCount} donated</p>
        </div>
      </div>
      {saveStatus==="saved"&&<div style={{position:"absolute",top:"8px",right:"12px",fontSize:"10px",color:"rgba(255,255,255,0.7)",display:"flex",alignItems:"center",gap:"4px"}}><span style={{color:"#7EE89E"}}>●</span> Saved</div>}
    </div>
    <div style={{display:"flex",overflowX:"auto",background:C.card,borderBottom:`1px solid ${C.border}`,paddingLeft:"6px"}}>
      <TabBtn active={tab==="dashboard"} onClick={()=>setTab("dashboard")}>📊 Dashboard</TabBtn>
      <TabBtn active={tab==="inventory"} onClick={()=>setTab("inventory")} count={state.items.length}>👚 Inventory</TabBtn>
      <TabBtn active={tab==="outfits"} onClick={()=>setTab("outfits")} count={state.outfits.length}>👗 Outfits</TabBtn>
      <TabBtn active={tab==="settings"} onClick={()=>setTab("settings")}>⚙️</TabBtn>
    </div>
    <div style={{padding:"18px",maxWidth:"800px",margin:"0 auto"}}>
      {tab==="dashboard"&&<Dashboard state={state}/>}
      {tab==="inventory"&&<Inventory state={state} dispatch={dispatch}/>}
      {tab==="outfits"&&<Outfits state={state} dispatch={dispatch}/>}
      {tab==="settings"&&<Settings dispatch={dispatch}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wardrobe">
<meta name="theme-color" content="#C4704B">
<title>Anna's Wardrobe Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#FAF5F0;color:#3D2E1F;-webkit-tap-highlight-color:transparent}
button,select,input{font-family:'DM Sans',sans-serif;font-size:13px}
.hdr{background:linear-gradient(135deg,#C4704B,#D4A574);padding:20px 18px 14px;border-radius:0 0 20px 20px}
.hdr h1{margin:0;font-size:19px;font-weight:700;color:#fff;font-family:'Playfair Display',serif}
.hdr p{margin:2px 0 0;font-size:11px;color:rgba(255,255,255,0.8)}
.tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #E8DDD0}
.tb{padding:10px 14px;border:none;border-bottom:3px solid transparent;background:none;color:#8A7968;font-weight:500;cursor:pointer;white-space:nowrap}
.tb.on{color:#C4704B;font-weight:700;border-bottom-color:#C4704B}
.cn{display:inline-block;background:#E8DDD0;color:#8A7968;border-radius:10px;padding:0 6px;font-size:10px;font-weight:600;margin-left:4px}
.tb.on .cn{background:#E8A889;color:#C4704B}
.wrap{padding:16px;max-width:800px;margin:0 auto}
.cd{background:#fff;border-radius:14px;padding:14px;border:1px solid #E8DDD0;margin-bottom:10px}
.row{display:flex;align-items:center;gap:8px;background:#fff;border-radius:12px;padding:10px 12px;border:1px solid #E8DDD0;margin-bottom:5px}
.nm{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sm{font-size:10px;color:#8A7968}
.bg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.bg-k{background:rgba(139,158,126,0.13);color:#8B9E7E;border:1px solid rgba(139,158,126,0.27)}
.bg-d{background:rgba(196,112,75,0.13);color:#C4704B;border:1px solid rgba(196,112,75,0.27)}
.bg-m{background:rgba(212,165,116,0.13);color:#D4A574;border:1px solid rgba(212,165,116,0.27)}
.bg-w{background:rgba(91,123,165,0.13);color:#5B7BA5}
.bg-c{background:rgba(139,158,126,0.13);color:#8B9E7E}
.ip{padding:9px 12px;border:1px solid #E8DDD0;border-radius:10px;color:#3D2E1F;background:#FAF5F0;outline:none;width:100%;box-sizing:border-box}
.bt{padding:9px 16px;border:none;border-radius:10px;font-weight:600;cursor:pointer}
.ba{background:#C4704B;color:#fff}
.bs{background:#8B9E7E;color:#fff}
.sm-b{width:30px;height:30px;border:1px solid #E8DDD0;border-radius:8px;background:#FAF5F0;cursor:pointer;font-size:13px;padding:0;display:inline-flex;align-items:center;justify-content:center}
.pl{padding:4px 9px;border:2px solid #E8DDD0;border-radius:16px;background:#FAF5F0;font-size:11px;cursor:pointer;color:#3D2E1F}
.pl.on{border-color:#C4704B;background:rgba(196,112,75,0.08);font-weight:600;color:#C4704B}
.gh{background:transparent;border:1px solid #E8DDD0;color:#8A7968;border-radius:18px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer}
.gh.on{border-color:#C4704B;background:rgba(196,112,75,0.08);color:#C4704B}
.oc{padding:12px;background:#FAF5F0;border-radius:10px;border:1px solid #E8DDD0;margin-bottom:8px}
.ot{padding:2px 7px;background:#fff;border-radius:6px;font-size:10px;color:#3D2E1F;border:1px solid #E8DDD0;display:inline-block;margin:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fw{display:flex;flex-wrap:wrap;gap:8px}
</style>
</head>
<body>
<div id="app">Loading...</div>
<script>
(function(){

var ITEMS=[
["Black L.L. Bean tank","Tops","Tanks",1],
["White L.L. Bean tank","Tops","Tanks",0],
["Lane Bryant tank","Tops","Tanks",1],
["Black Torrid t-shirt","Tops","T-Shirts",0],
["Black Old Navy t-shirt","Tops","T-Shirts",0],
["Black Torrid SS sweater tee","Tops","T-Shirts",0],
["White L.L. Bean t-shirt","Tops","T-Shirts",0],
["White Torrid t-shirt","Tops","T-Shirts",0],
["Cream colored t-shirt","Tops","T-Shirts",0],
["Green/mint L.L. Bean t-shirt","Tops","T-Shirts",0],
["LS light blue chambray button up","Tops","Button Ups",0],
["SS chambray button up","Tops","Button Ups",0],
["Dark Amazon brown plaid button up","Tops","Button Ups",1],
["Light brown/gray flannel button up","Tops","Button Ups",0],
["Buffalo plaid button up","Tops","Button Ups",0],
["Dark green plaid button up","Tops","Button Ups",0],
["Black LS scoop Good American","Tops","Sweaters",0],
["Black Torrid v-neck LS","Tops","Sweaters",0],
["Amazon lightweight black sweater","Tops","Sweaters",0],
["Black 3/4 sleeve scallop sweater","Tops","Sweaters",0],
["V-neck black Torrid sweater","Tops","Sweaters",0],
["Amazon lightweight gray sweater","Tops","Sweaters",1],
["Amazon v-neck brown sweater","Tops","Sweaters",1],
["Fuzzy L.L. Bean cream pullover","Tops","Sweaters",0],
["V-neck cream Old Navy sweater","Tops","Sweaters",0],
["Gray LS sweater bronze buttons","Tops","Sweaters",0],
["Torrid blue/white striped sweater","Tops","Sweaters",0],
["Navy Inspire crew neck sweater","Tops","Sweaters",0],
["Green We Wander LS","Tops","Sweaters",0],
["Corduroy pullover","Tops","Sweaters",0],
["White blouse","Tops","Blouses",0],
["Dark green blouse","Tops","Blouses",0],
["Torrid black blazer","Outerwear","Blazers",1],
["Tan blazer","Outerwear","Blazers",1],
["Purple blazer","Outerwear","Blazers",0],
["Teal blazer","Outerwear","Blazers",0],
["White Inspire half zip","Tops","Sweatshirts",0],
["Navy Inspire zip up jacket","Tops","Sweatshirts",0],
["Teal L.L. Bean pullover","Tops","Sweatshirts",0],
["Torrid cropped gray dress pants","Bottoms","Pants",1],
["Dark wash Torrid skinny jeans","Bottoms","Jeans",2],
["Dark wash London skinny jeans","Bottoms","Jeans",0],
["Light wash Torrid skinny jeans","Bottoms","Jeans",1],
["Vervet size 20 jeans","Bottoms","Jeans",1],
["Green London pull-on jeans","Bottoms","Jeans",0],
["Black Torrid booties","Shoes","Boots",0],
["Black Old Navy sneakers","Shoes","Sneakers",1],
["Torrid black flats","Shoes","Flats",1],
["White sneakers","Shoes","Sneakers",1],
["Cream Torrid riding boots","Shoes","Boots",0],
["Light brown Target booties","Shoes","Boots",0],
["Dark brown riding boots","Shoes","Boots",1],
["Leopard print flats","Shoes","Flats",1]
];

function makeItems(){
  return ITEMS.map(function(x,i){
    return{id:"item-"+i,name:x[0],category:x[1],subcategory:x[2],status:"keeping",wornCount:x[3],lastWorn:null};
  });
}

var DEF_OUTFITS=[
  {id:"outfit-1",name:"Work Outfit #1",type:"work",date:"2026-03-20",itemIds:["item-33","item-0","item-40","item-52"],notes:""},
  {id:"outfit-2",name:"Work Outfit #2",type:"work",date:"2026-03-21",itemIds:["item-21","item-42","item-46"],notes:"Also wore Torrid vest (not in inventory)"},
  {id:"outfit-3",name:"Work Outfit #3",type:"work",date:"2026-03-22",itemIds:["item-32","item-2","item-39","item-47"],notes:"Low confidence outfit"},
  {id:"outfit-4",name:"Work Outfit #4",type:"work",date:"2026-03-23",itemIds:["item-22","item-40","item-51"],notes:""},
  {id:"outfit-5",name:"Casual Outfit #5",type:"casual",date:"2026-03-24",itemIds:["item-12","item-0","item-43","item-48"],notes:""}
];

var CATS={"Tanks":[3],"T-Shirts":[7],"Button Ups":[6],"Sweaters":[10],"Blouses":[3],"Sweatshirts":[3],"Jeans":[5],"Pants":[2],"Blazers":[4],"Boots":[4],"Sneakers":[3],"Flats":[3]};
var CATK=["Tanks","T-Shirts","Button Ups","Sweaters","Blouses","Sweatshirts","Jeans","Pants","Blazers","Boots","Sneakers","Flats"];
var SUBS={"Tops":["Tanks","T-Shirts","Button Ups","Sweaters","Blouses","Sweatshirts"],"Bottoms":["Jeans","Pants"],"Outerwear":["Blazers","Coats","Jackets"],"Shoes":["Boots","Sneakers","Flats","Heels"]};

var st,tab="dashboard",invS="all",invC="all",invSub="all",invQ="",showAdd=false,editId=null;
var formN="",formCat="Tops",formSub="",formSt="keeping",formNo="";
var oView="log",oSel=[],oName="",oType="casual",oNotes="",oFC="all";

function makeDef(){return{items:makeItems(),outfits:DEF_OUTFITS.map(function(o){return JSON.parse(JSON.stringify(o))}),donated:25}}

function load(){try{var s=localStorage.getItem("wt5");if(s)return JSON.parse(s)}catch(e){}return null}
function save(){try{localStorage.setItem("wt5",JSON.stringify(st))}catch(e){}}

st=load()||makeDef();

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function td(){return new Date().toISOString().slice(0,10)}

function bgc(s){return s==="keeping"?"bg bg-k":s==="donating"?"bg bg-d":"bg bg-m"}
function bgt(s){return s==="keeping"?"Keep":s==="donating"?"Donate":"Maybe"}

function R(){
  var keep=st.items.filter(function(i){return i.status==="keeping"});
  var a=document.getElementById("app");
  var h="";

  h+='<div class="hdr"><div style="display:flex;align-items:center;gap:10px">';
  h+='<span style="font-size:24px">&#x1F457;</span><div>';
  h+='<h1>Anna\'s Wardrobe Tracker</h1>';
  h+='<p>Capsule-Lite - '+keep.length+' items - '+st.donated+' donated</p>';
  h+='</div></div></div>';

  h+='<div class="tabs">';
  h+='<button class="tb'+(tab==="dashboard"?" on":"")+'" onclick="T(\'dashboard\')">Dashboard</button>';
  h+='<button class="tb'+(tab==="inventory"?" on":"")+'" onclick="T(\'inventory\')">Inventory<span class="cn">'+st.items.length+'</span></button>';
  h+='<button class="tb'+(tab==="outfits"?" on":"")+'" onclick="T(\'outfits\')">Outfits<span class="cn">'+st.outfits.length+'</span></button>';
  h+='<button class="tb'+(tab==="settings"?" on":"")+'" onclick="T(\'settings\')">Settings</button>';
  h+='</div><div class="wrap">';

  if(tab==="dashboard") h+=rDash(keep);
  else if(tab==="inventory") h+=rInv();
  else if(tab==="outfits") h+=rOut(keep);
  else h+=rSet();

  h+='</div>';
  a.innerHTML=h;
}

function rDash(keep){
  var worn=keep.filter(function(i){return i.wornCount>0}).length;
  var h='<div class="fw" style="margin-bottom:14px">';
  h+=sCard("Wardrobe",keep.length,"#8B9E7E");
  h+=sCard("Donated",st.donated,"#C4704B");
  h+=sCard("Outfits",st.outfits.length,"#C4704B");
  h+=sCard("Worn",worn,"#D4A574");
  h+='</div>';

  var sg={};keep.forEach(function(i){var k=i.subcategory||i.category;sg[k]=(sg[k]||0)+1});
  var sd=Object.keys(sg).map(function(k){return[k,sg[k]]}).sort(function(a,b){return b[1]-a[1]}).slice(0,8);
  var mx=sd.length?Math.max.apply(null,sd.map(function(d){return d[1]})):1;

  h+='<div class="cd"><h3 style="margin:0 0 10px;font-size:14px">By Subcategory</h3>';
  for(var i=0;i<sd.length;i++){
    var pct=Math.round((sd[i][1]/mx)*100);
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">';
    h+='<span style="font-size:11px;color:#8A7968;width:85px;text-align:right">'+sd[i][0]+'</span>';
    h+='<div style="flex:1;height:16px;background:#E8DDD0;border-radius:4px;overflow:hidden">';
    h+='<div style="width:'+pct+'%;height:100%;background:#8B9E7E;border-radius:4px"></div></div>';
    h+='<span style="font-size:11px;font-weight:600;width:18px">'+sd[i][1]+'</span></div>';
  }
  h+='</div>';

  h+='<div class="cd"><h3 style="margin:0 0 10px;font-size:14px">Capsule-Lite Targets</h3>';
  h+='<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">';
  for(var j=0;j<CATK.length;j++){
    var c=CATK[j],cur=keep.filter(function(x){return x.subcategory===c}).length,tgt=CATS[c][0];
    h+=rRing(cur,tgt,c);
  }
  h+='</div></div>';
  return h;
}

function sCard(label,val,color){
  return'<div class="cd" style="flex:1;min-width:70px"><div style="font-size:22px;font-weight:700;color:'+color+';font-family:Playfair Display,serif">'+val+'</div><div style="font-size:10px;color:#8A7968">'+label+'</div></div>';
}

function rRing(cur,tgt,label){
  var pct=Math.min(Math.round((cur/tgt)*100),100);
  var over=cur>tgt;var co=over?"#C45B5B":"#8B9E7E";
  var r=22,circ=Math.round(2*3.14159*r);
  var dash=Math.round((pct/100)*circ);
  var h='<div style="text-align:center;min-width:68px">';
  h+='<div style="position:relative;width:52px;height:52px;margin:0 auto">';
  h+='<svg width="52" height="52" viewBox="0 0 52 52">';
  h+='<circle cx="26" cy="26" r="'+r+'" fill="none" stroke="#E8DDD0" stroke-width="4"/>';
  h+='<circle cx="26" cy="26" r="'+r+'" fill="none" stroke="'+co+'" stroke-width="4" stroke-dasharray="'+dash+' '+circ+'" stroke-linecap="round" transform="rotate(-90 26 26)"/>';
  h+='</svg>';
  h+='<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:700;color:'+(over?"#C45B5B":"#3D2E1F")+'">'+cur+'/'+tgt+'</div>';
  h+='</div><div style="font-size:9px;color:#8A7968;margin-top:3px">'+label+'</div></div>';
  return h;
}

function rInv(){
  var items=st.items.filter(function(i){
    if(invS!=="all"&&i.status!==invS)return false;
    if(invSub!=="all"&&i.subcategory!==invSub)return false;
    if(invQ&&i.name.toLowerCase().indexOf(invQ.toLowerCase())<0)return false;
    return true;
  });
  var allSubs=[];
  var parentCats=["Tops","Bottoms","Outerwear","Shoes"];
  for(var ak=0;ak<parentCats.length;ak++){var ss=SUBS[parentCats[ak]]||[];for(var as2=0;as2<ss.length;as2++){allSubs.push(ss[as2])}}

  var h='<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center">';
  h+='<input class="ip" style="flex:1;min-width:90px" placeholder="Search..." value="'+esc(invQ)+'" oninput="window._invQ(this.value)">';
  h+='<select class="ip" style="width:auto" onchange="window._invS(this.value)">';
  h+='<option value="all"'+(invS==="all"?" selected":"")+'>All</option><option value="keeping"'+(invS==="keeping"?" selected":"")+'>Keep</option><option value="donating"'+(invS==="donating"?" selected":"")+'>Donate</option><option value="maybe"'+(invS==="maybe"?" selected":"")+'>Maybe</option></select>';
  h+='<select class="ip" style="width:auto" onchange="window._invSub(this.value)">';
  h+='<option value="all">All Types</option>';
  for(var ci=0;ci<allSubs.length;ci++){
    var hasSub=st.items.some(function(x){return x.subcategory===allSubs[ci]});
    if(hasSub)h+='<option value="'+allSubs[ci]+'"'+(invSub===allSubs[ci]?" selected":"")+'>'+allSubs[ci]+'</option>';
  }
  h+='</select>';
  h+='<button class="bt ba" onclick="window._togAdd()">'+(showAdd?"Cancel":"+ Add")+'</button></div>';

  if(showAdd){
    var fsubs=SUBS[formCat]||[];
    var allFormSubs=[];for(var afk=0;afk<["Tops","Bottoms","Outerwear","Shoes"].length;afk++){var fss=SUBS[["Tops","Bottoms","Outerwear","Shoes"][afk]]||[];for(var afs=0;afs<fss.length;afs++){allFormSubs.push(fss[afs])}}
    h+='<div class="cd"><h4 style="margin:0 0 8px;font-size:14px">'+(editId?"Edit Item":"New Item")+'</h4>';
    h+='<div class="g2">';
    h+='<input class="ip" style="grid-column:1/-1" placeholder="Item name" value="'+esc(formN)+'" oninput="window._fN(this.value)">';
    h+='<select class="ip" onchange="window._fSub(this.value)"><option value="">Type...</option>';
    for(var fsi=0;fsi<allFormSubs.length;fsi++)h+='<option value="'+allFormSubs[fsi]+'"'+(formSub===allFormSubs[fsi]?" selected":"")+'>'+allFormSubs[fsi]+'</option>';
    h+='</select>';
    h+='<select class="ip" onchange="window._fSt(this.value)"><option value="keeping"'+(formSt==="keeping"?" selected":"")+'>Keeping</option><option value="donating"'+(formSt==="donating"?" selected":"")+'>Donating</option><option value="maybe"'+(formSt==="maybe"?" selected":"")+'>Maybe</option></select>';
    h+='<input class="ip" placeholder="Notes" value="'+esc(formNo)+'" oninput="window._fNo(this.value)">';
    h+='</div><button class="bt bs" style="margin-top:8px" onclick="window._submit()">'+(editId?"Save":"Add")+'</button></div>';
  }

  h+='<div style="font-size:11px;color:#8A7968;margin-bottom:6px">'+items.length+' item'+(items.length!==1?"s":"")+'</div>';

  for(var ii=0;ii<items.length;ii++){
    var it=items[ii];
    h+='<div class="row">';
    h+='<div style="flex:1;min-width:0"><div class="nm">'+esc(it.name)+'</div>';
    h+='<div class="sm">'+(it.subcategory||it.category)+(it.wornCount>0?" - "+it.wornCount+"x":"")+'</div></div>';
    h+='<span class="'+bgc(it.status)+'">'+bgt(it.status)+'</span>';
    if(it.status==="keeping")h+='<button class="sm-b" onclick="window._wear(\''+it.id+'\')">+1</button>';
    h+='<button class="sm-b" onclick="window._edit(\''+it.id+'\')">&#9998;</button>';
    if(it.status==="keeping")h+='<button class="sm-b" style="border-color:rgba(196,112,75,0.27)" onclick="window._don(\''+it.id+'\')">&#10005;</button>';
    h+='</div>';
  }
  if(!items.length)h+='<div style="text-align:center;padding:30px;color:#8A7968">No items found</div>';
  return h;
}

function rOut(keep){
  var disp=oFC==="all"?keep:keep.filter(function(i){return i.subcategory===oFC});
  var h='<div style="display:flex;gap:6px;margin-bottom:12px">';
  var vws=[["log","+ Log"],["history","History"],["stats","Stats"]];
  for(var vi=0;vi<vws.length;vi++){
    h+='<button class="gh'+(oView===vws[vi][0]?" on":"")+'" onclick="window._oV(\''+vws[vi][0]+'\')">'+vws[vi][1]+'</button>';
  }
  h+='</div>';

  if(oView==="log"){
    h+='<div class="cd"><h3 style="margin:0 0 10px;font-size:14px">Log Today\'s Outfit</h3>';
    h+='<div class="g2" style="margin-bottom:8px">';
    h+='<input class="ip" placeholder="Outfit name" value="'+esc(oName)+'" oninput="oName=this.value">';
    h+='<select class="ip" onchange="oType=this.value">';
    var ots=["work","casual","date night","weekend","other"];
    for(var oi=0;oi<ots.length;oi++)h+='<option value="'+ots[oi]+'"'+(oType===ots[oi]?" selected":"")+'>'+ots[oi]+'</option>';
    h+='</select></div>';
    h+='<input class="ip" style="margin-bottom:8px" placeholder="Notes" value="'+esc(oNotes)+'" oninput="oNotes=this.value">';

    h+='<div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap">';
    var usedSubs={};keep.forEach(function(i){if(i.subcategory)usedSubs[i.subcategory]=true});
    var oSubKeys=["all"].concat(Object.keys(usedSubs).sort());
    for(var fi=0;fi<oSubKeys.length;fi++){
      h+='<button class="gh'+(oFC===oSubKeys[fi]?" on":"")+'" style="padding:3px 10px;font-size:11px" onclick="window._oFC(\''+oSubKeys[fi]+'\')">'+oSubKeys[fi]+'</button>';
    }
    h+='</div>';

    h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;max-height:200px;overflow-y:auto">';
    for(var di=0;di<disp.length;di++){
      var on=oSel.indexOf(disp[di].id)>=0;
      h+='<button class="pl'+(on?" on":"")+'" onclick="window._oTog(\''+disp[di].id+'\')">'+esc(disp[di].name)+'</button>';
    }
    h+='</div>';
    h+='<button class="bt ba" '+(oSel.length?'':'disabled style="opacity:0.5"')+' onclick="window._oLog()">Log Outfit ('+oSel.length+')</button></div>';
  }

  if(oView==="history"){
    h+='<div class="cd"><h3 style="margin:0 0 10px;font-size:14px">All Outfits ('+st.outfits.length+')</h3>';
    var rev=st.outfits.slice().reverse();
    for(var hi=0;hi<rev.length;hi++){
      var o=rev[hi];
      h+='<div class="oc">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">';
      h+='<div><span style="font-weight:600;font-size:13px">'+esc(o.name)+'</span>';
      if(o.type)h+=' <span class="bg bg-'+(o.type==="work"?"w":"c")+'">'+o.type+'</span>';
      h+='</div><span style="font-size:10px;color:#8A7968">'+o.date+'</span></div>';
      if(o.notes)h+='<div style="font-size:11px;color:#8A7968;margin-bottom:4px;font-style:italic">'+esc(o.notes)+'</div>';
      for(var oi2=0;oi2<o.itemIds.length;oi2++){
        var it2=st.items.find(function(x){return x.id===o.itemIds[oi2]});
        if(it2)h+='<span class="ot">'+esc(it2.name)+'</span>';
      }
      h+='</div>';
    }
    h+='</div>';
  }

  if(oView==="stats"){
    var wd=keep.filter(function(i){return i.wornCount>0}).sort(function(a,b){return b.wornCount-a.wornCount}).slice(0,10);
    var nw=keep.filter(function(i){return!i.wornCount});
    h+='<div class="cd"><h3 style="margin:0 0 10px;font-size:14px">Most Worn</h3>';
    if(wd.length){for(var wi=0;wi<wd.length;wi++){
      h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
      h+='<span style="font-size:11px;font-weight:700;color:#8A7968;width:16px">#'+(wi+1)+'</span>';
      h+='<span style="flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(wd[wi].name)+'</span>';
      h+='<span style="background:rgba(139,158,126,0.13);color:#8B9E7E;padding:2px 6px;border-radius:6px;font-size:10px;font-weight:600">'+wd[wi].wornCount+'x</span></div>';
    }}else{h+='<div style="text-align:center;padding:14px;color:#8A7968;font-size:12px">Log outfits to see stats!</div>';}
    h+='</div>';

    h+='<div class="cd"><h3 style="margin:0 0 10px;font-size:14px">Never Worn ('+nw.length+')</h3>';
    h+='<div style="max-height:180px;overflow-y:auto">';
    var nwShow=nw.slice(0,15);
    for(var ni=0;ni<nwShow.length;ni++){
      h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:12px">';
      h+='<span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(nwShow[ni].name)+'</span>';
      h+='<button style="padding:2px 6px;border:1px solid rgba(196,112,75,0.27);border-radius:6px;background:rgba(196,112,75,0.07);color:#C4704B;font-size:10px;cursor:pointer;font-weight:600" onclick="window._don(\''+nwShow[ni].id+'\')">Donate</button></div>';
    }
    h+='</div></div>';
  }
  return h;
}

function rSet(){
  var h='<div class="cd"><h3 style="margin:0 0 10px;font-size:14px">Settings</h3>';
  h+='<p style="font-size:12px;color:#8A7968;margin-bottom:10px">Data saves automatically to this device.</p>';
  h+='<p style="font-size:12px;color:#8A7968;margin-bottom:10px">Log outfits here daily. Chat with Claude to sync updates.</p>';
  h+='<button class="bt" style="background:rgba(196,91,91,0.1);color:#C45B5B;border:1px solid rgba(196,91,91,0.27)" onclick="window._reset()">Reset to Original</button></div>';
  return h;
}

// Actions
window.T=function(t){tab=t;R()};
window._invQ=function(v){invQ=v;R()};
window._invS=function(v){invS=v;R()};
window._invC=function(v){invC=v;invSub="all";R()};
window._invSub=function(v){invSub=v;R()};
window._togAdd=function(){showAdd=!showAdd;editId=null;formN="";formCat="Tops";formSub="";formSt="keeping";formNo="";R()};
window._fN=function(v){formN=v};
window._fCat=function(v){formCat=v;formSub="";R()};
window._fSub=function(v){formSub=v};
window._fSt=function(v){formSt=v};
window._fNo=function(v){formNo=v};
window._submit=function(){
  if(!formN.trim())return;
  var subToCat={"Tanks":"Tops","T-Shirts":"Tops","Button Ups":"Tops","Sweaters":"Tops","Blouses":"Tops","Sweatshirts":"Tops","Jeans":"Bottoms","Pants":"Bottoms","Blazers":"Outerwear","Coats":"Outerwear","Jackets":"Outerwear","Boots":"Shoes","Sneakers":"Shoes","Flats":"Shoes","Heels":"Shoes"};
  var autoCat=subToCat[formSub]||formCat;
  if(editId){
    var it=st.items.find(function(i){return i.id===editId});
    if(it){it.name=formN;it.category=autoCat;it.subcategory=formSub;it.status=formSt;it.notes=formNo}
  }else{
    st.items.push({id:"item-"+Date.now()+"-"+Math.random().toString(36).slice(2,6),name:formN,category:autoCat,subcategory:formSub,status:formSt,notes:formNo,wornCount:0,lastWorn:null});
  }
  showAdd=false;editId=null;formN="";formCat="Tops";formSub="";formSt="keeping";formNo="";
  save();R();
};
window._edit=function(id){
  var it=st.items.find(function(i){return i.id===id});
  if(!it)return;
  formN=it.name;formCat=it.category;formSub=it.subcategory||"";formSt=it.status;formNo=it.notes||"";
  editId=id;showAdd=true;R();
};
window._wear=function(id){
  var it=st.items.find(function(i){return i.id===id});
  if(it){it.wornCount=(it.wornCount||0)+1;it.lastWorn=td()}
  save();R();
};
window._don=function(id){
  if(!confirm("Donate this item?"))return;
  st.items=st.items.filter(function(i){return i.id!==id});
  st.donated++;save();R();
};
window._oV=function(v){oView=v;R()};
window._oFC=function(v){oFC=v;R()};
window._oTog=function(id){var idx=oSel.indexOf(id);if(idx>=0)oSel.splice(idx,1);else oSel.push(id);R()};
window._oLog=function(){
  if(!oSel.length)return;
  st.outfits.push({id:"o-"+Date.now(),name:oName||"Outfit #"+(st.outfits.length+1),type:oType,date:td(),itemIds:oSel.slice(),notes:oNotes});
  oSel.forEach(function(id){var it=st.items.find(function(i){return i.id===id});if(it){it.wornCount=(it.wornCount||0)+1;it.lastWorn=td()}});
  oSel=[];oName="";oNotes="";save();R();
};
window._reset=function(){if(!confirm("Reset everything?"))return;st=makeDef();save();R()};

R();

})();
</script>
</body>
</html>
